name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Cancel in-progress runs for the same ref when new commits are pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build site
        run: npm run build

  # Automatically merge Dependabot PRs once the tests and build above pass.
  # This job depends on `test`, so it only runs after CI has succeeded, which
  # is what gates the merge — no branch-protection configuration required.
  dependabot-auto-merge:
    name: Auto-merge Dependabot PRs
    needs: test
    runs-on: ubuntu-latest
    # Only for Dependabot's own pull requests.
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      # Approve the PR so the merge also satisfies any "require approval"
      # branch protection (Dependabot cannot approve its own PRs).
      - name: Approve the pull request
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge the pull request
        run: gh pr merge --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
